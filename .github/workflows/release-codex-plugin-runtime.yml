name: Release Codex Plugin Runtime and Bundle

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-runtime:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-14
            target: darwin-arm64
            artifact: waggle-server
          - runner: macos-15-intel
            target: darwin-x86_64
            artifact: waggle-server
          - runner: ubuntu-latest
            target: linux-x86_64
            artifact: waggle-server
          - runner: ubuntu-24.04-arm
            target: linux-aarch64
            artifact: waggle-server
          - runner: windows-latest
            target: win32-x86_64
            artifact: waggle-server.exe

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1
        with:
          python-version: "3.11"

      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip setuptools wheel
          python -m pip install . pyinstaller

      - name: Build current runtime
        run: python scripts/build_codex_plugin_runtime.py --build-current --probe

      - name: Sign macOS runtime
        if: startsWith(matrix.target, 'darwin-')
        env:
          APPLE_DEVELOPER_ID: ${{ secrets.APPLE_DEVELOPER_ID }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_NOTARY_PASSWORD: ${{ secrets.APPLE_NOTARY_PASSWORD }}
        run: |
          if [ -z "$APPLE_DEVELOPER_ID" ] || [ -z "$APPLE_ID" ] || [ -z "$APPLE_TEAM_ID" ] || [ -z "$APPLE_NOTARY_PASSWORD" ]; then
            echo "Skipping macOS signing/notarization because Apple Developer ID credentials are not configured."
            exit 0
          fi
          codesign --force --deep --timestamp --options runtime \
            --sign "$APPLE_DEVELOPER_ID" \
            "plugins/waggle/runtime/${{ matrix.target }}/${{ matrix.artifact }}"
          ditto -c -k --keepParent \
            "plugins/waggle/runtime/${{ matrix.target }}" \
            "codex-plugin-runtime-${{ matrix.target }}.zip"
          ZIP_PATH="codex-plugin-runtime-${{ matrix.target }}.zip" python3 - <<'PY'
          import os
          import subprocess
          import sys
          import time

          command = [
              "xcrun",
              "notarytool",
              "submit",
              os.environ["ZIP_PATH"],
              "--apple-id",
              os.environ["APPLE_ID"],
              "--team-id",
              os.environ["APPLE_TEAM_ID"],
              "--password",
              os.environ["APPLE_NOTARY_PASSWORD"],
              "--wait",
          ]

          for attempt in range(1, 4):
              try:
                  subprocess.run(command, check=True, timeout=1800)
                  sys.exit(0)
              except subprocess.TimeoutExpired:
                  print(f"macOS notarization timed out on attempt {attempt}.")
              except subprocess.CalledProcessError as exc:
                  print(f"macOS notarization failed on attempt {attempt}: exit {exc.returncode}.")

              if attempt == 3:
                  sys.exit(1)
              time.sleep(attempt * 60)
          PY
          xcrun stapler staple "plugins/waggle/runtime/${{ matrix.target }}/${{ matrix.artifact }}" || true

      - name: Sign Windows runtime
        if: startsWith(matrix.target, 'win32-')
        env:
          WINDOWS_CERT_BASE64: ${{ secrets.WINDOWS_CERT_BASE64 }}
          WINDOWS_CERT_PASSWORD: ${{ secrets.WINDOWS_CERT_PASSWORD }}
        shell: pwsh
        run: |
          if ([string]::IsNullOrWhiteSpace($env:WINDOWS_CERT_BASE64)) {
            Write-Host "Skipping Windows Authenticode signing because WINDOWS_CERT_BASE64 is not configured."
            exit 0
          }
          $certPath = "$env:RUNNER_TEMP\codesign.pfx"
          [IO.File]::WriteAllBytes($certPath, [Convert]::FromBase64String($env:WINDOWS_CERT_BASE64))
          & signtool sign /f $certPath /p $env:WINDOWS_CERT_PASSWORD /tr http://timestamp.digicert.com /td sha256 /fd sha256 "plugins/waggle/runtime/${{ matrix.target }}/${{ matrix.artifact }}"
          Remove-Item $certPath

      - name: Validate runtime artifact
        run: python scripts/build_codex_plugin_runtime.py --probe

      - name: Verify macOS signature when configured
        if: startsWith(matrix.target, 'darwin-')
        env:
          APPLE_DEVELOPER_ID: ${{ secrets.APPLE_DEVELOPER_ID }}
        run: |
          if [ -z "$APPLE_DEVELOPER_ID" ]; then
            echo "Skipping macOS signature verification because signing was skipped."
            exit 0
          fi
          python scripts/build_codex_plugin_runtime.py --verify-signatures

      - name: Verify Windows signature when configured
        if: startsWith(matrix.target, 'win32-')
        env:
          WINDOWS_CERT_BASE64: ${{ secrets.WINDOWS_CERT_BASE64 }}
        shell: pwsh
        run: |
          if ([string]::IsNullOrWhiteSpace($env:WINDOWS_CERT_BASE64)) {
            Write-Host "Skipping Windows signature verification because signing was skipped."
            exit 0
          }
          python scripts/build_codex_plugin_runtime.py --verify-signatures

      - name: Upload runtime artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: codex-plugin-runtime-${{ matrix.target }}
          path: plugins/waggle/runtime/${{ matrix.target }}/

  assemble-runtime:
    name: Assemble runtime layout
    runs-on: ubuntu-latest
    needs: build-runtime
    permissions:
      attestations: write
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          persist-credentials: false

      - name: Download runtime artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093
        with:
          pattern: codex-plugin-runtime-*
          path: plugins/waggle/runtime
          merge-multiple: false

      - name: Move artifacts into runtime layout
        shell: bash
        run: |
          for artifact_dir in plugins/waggle/runtime/codex-plugin-runtime-*; do
            target="${artifact_dir##*codex-plugin-runtime-}"
            mkdir -p "plugins/waggle/runtime/${target}"
            find "$artifact_dir" -mindepth 1 -maxdepth 1 -exec mv {} "plugins/waggle/runtime/${target}/" \;
            rmdir "$artifact_dir"
            case "$target" in
              darwin-*|linux-*)
                chmod +x "plugins/waggle/runtime/${target}/waggle-server"
                ;;
            esac
          done

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1
        with:
          python-version: "3.11"

      - name: Validate assembled runtime layout
        run: python scripts/build_codex_plugin_runtime.py --require-artifacts

      - name: Package Codex plugin bundles
        env:
          BUNDLE_VERSION: ${{ github.ref_name }}
        run: |
          python scripts/package_codex_plugin.py \
            --bundle-version "$BUNDLE_VERSION" \
            --output-dir dist/codex-plugin

      - name: Attest Codex plugin bundles
        uses: actions/attest-build-provenance@96b4a1ef7235a096b17240c259729fdd70c83d45
        with:
          subject-path: dist/codex-plugin/*

      - name: Verify Codex plugin bundle attestations
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          for artifact in dist/codex-plugin/*; do
            for attempt in 1 2 3; do
              if gh attestation verify "$artifact" --repo "$GITHUB_REPOSITORY"; then
                break
              fi
              if [ "$attempt" -eq 3 ]; then
                echo "Attestation verification failed for $artifact after $attempt attempts."
                exit 1
              fi
              sleep $((attempt * 30))
            done
          done

      - name: Upload Codex plugin bundle artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: waggle-codex-plugin-bundles
          path: dist/codex-plugin/*

      - name: Upload Codex plugin bundles to GitHub release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b
        with:
          files: dist/codex-plugin/*
